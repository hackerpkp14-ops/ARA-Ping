<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>ARA Ping</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="auth">

  <div id="logoBox">

    <div id="logo">
      A
    </div>

    <div>

      <h1>ARA Ping</h1>

      <small>
        Private Messaging
      </small>

    </div>

  </div>

  <input
    id="username"
    placeholder="Username"
  >

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <button id="signupBtn">
    Sign Up
  </button>

  <button id="loginBtn">
    Login
  </button>

</div>

<div id="app">

  <div id="sidebar">

    <div id="sidebarTop">

      <h2>ARA Ping</h2>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

    <div id="searchBox">

      <input
        id="searchInput"
        placeholder="Search username"
      >

      <button id="searchBtn">
        Search
      </button>

    </div>

    <div id="users"></div>

  </div>

  <div id="chat">

    <div id="chatHeader">
      Select Chat
    </div>

    <div id="messages"></div>

    <div id="sendBar">

      <input
        id="messageInput"
        placeholder="Type message"
      >

      <label id="imageBtn">

        📷

        <input
          type="file"
          id="imageInput"
          hidden
        >

      </label>

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="client.js"></script>

</body>

</html>
