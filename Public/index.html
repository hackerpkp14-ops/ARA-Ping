<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARA Ping</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- AUTH -->

<div id="auth">

  <h1>ARA Ping</h1>
  <p>Private Messaging</p>

  <input
    id="username"
    placeholder="Username"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
  />

  <div class="authBtns">

    <button id="signupBtn">
      Sign Up
    </button>

    <button id="loginBtn">
      Login
    </button>

  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <!-- SIDEBAR -->

  <div id="sidebar">

    <div id="sidebarTop">

      <div class="logo">
        ARA Ping
      </div>

      <button id="logoutBtn">
        Logout
      </button>

    </div>

    <div id="searchArea">

      <input
        id="searchInput"
        placeholder="Search username"
      />

      <button id="searchBtn">
        Search
      </button>

    </div>

    <div id="users"></div>

  </div>

  <!-- CHAT -->

  <div id="chatArea">

    <div id="chatHeader">
      Select Chat
    </div>

    <div id="messages"></div>

    <div id="sendBar">

      <input
        id="messageInput"
        placeholder="Type message"
      />

      <label id="imageLabel">

        📷

        <input
          type="file"
          id="imageInput"
          accept="image/*"
        />

      </label>

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
