<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARA Ping</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#111b21;
  color:white;
}

#auth{
  width:350px;
  margin:80px auto;
  background:#202c33;
  padding:30px;
  border-radius:14px;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#app{
  display:none;
  height:100vh;
}

#sidebar{
  width:300px;
  background:#202c33;
  overflow:auto;
}

.user{
  padding:16px;
  border-bottom:1px solid #2a3942;
  cursor:pointer;
}

.user:hover{
  background:#2a3942;
}

#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chatHeader{
  padding:16px;
  background:#202c33;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#messages{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  background:#005c4b;
  width:max-content;
  max-width:70%;
  padding:10px 14px;
  border-radius:12px;
  margin:8px 0;
}

.mine{
  margin-left:auto;
}

#sendBar{
  display:flex;
  padding:10px;
  background:#202c33;
}

#sendBar input{
  flex:1;
  margin:0;
  margin-right:10px;
}

#sendBar button{
  width:100px;
  margin:0;
}

#logoutBtn{
  width:100px;
}

</style>

</head>

<body>

<div id="auth">

  <h2>ARA Ping</h2>

  <input id="username" placeholder="Username">

  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Sign Up</button>

  <button onclick="login()">Login</button>

</div>

<div id="app">

  <div id="sidebar">

    <div style="padding:10px">

      <input
        id="searchInput"
        placeholder="Search username"
      >

      <button onclick="searchUser()">
        Search
      </button>

    </div>

    <div id="users"></div>

  </div>

  <div id="chat">

    <div id="chatHeader">

      <span id="chatName">
        Select chat
      </span>

      <button id="logoutBtn" onclick="logout()">
        Logout
      </button>

    </div>

    <div id="messages"></div>

    <div id="sendBar">

      <input
        id="messageInput"
        placeholder="Type message"
      >

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let me = "";
let currentUser = "";

const auth = document.getElementById("auth");
const app = document.getElementById("app");

const usersBox = document.getElementById("users");

const messages = document.getElementById("messages");

const messageInput = document.getElementById("messageInput");

const chatName = document.getElementById("chatName");

window.onload = ()=>{

  const saved = localStorage.getItem("ara-user");

  if(saved){

    me = saved;

    auth.style.display = "none";

    app.style.display = "flex";

  }

};

async function signup(){

  const username =
  document.getElementById("username")
  .value
  .trim();

  const password =
  document.getElementById("password")
  .value
  .trim();

  const res = await fetch("/signup",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      username,
      password
    })

  });

  const data = await res.json();

  if(data.ok){
    alert("Signup successful");
  }else{
    alert(data.error);
  }

}

async function login(){

  const username =
  document.getElementById("username")
  .value
  .trim();

  const password =
  document.getElementById("password")
  .value
  .trim();

  const res = await fetch("/login",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      username,
      password
    })

  });

  const data = await res.json();

  if(!data.ok){
    return alert(data.error);
  }

  me = data.username;

  localStorage.setItem(
    "ara-user",
    me
  );

  auth.style.display = "none";

  app.style.display = "flex";

}

function logout(){

  localStorage.removeItem("ara-user");

  location.reload();

}

async function searchUser(){

  const username =
  document.getElementById("searchInput")
  .value
  .trim();

  const res =
  await fetch("/search/" + username);

  const users =
  await res.json();

  usersBox.innerHTML = "";

  users.forEach(user=>{

    if(user.username === me){
      return;
    }

    const div =
    document.createElement("div");

    div.className = "user";

    div.innerText = user.username;

    div.onclick = ()=>{
      openChat(user.username);
    };

    usersBox.appendChild(div);

  });

}

async function openChat(user){

  currentUser = user;

  chatName.innerText = user;

  const res =
  await fetch(`/messages/${me}/${user}`);

  const data =
  await res.json();

  messages.innerHTML = "";

  data.forEach(renderMessage);

}

function renderMessage(m){

  if(
    (m.from === me && m.to === currentUser)
    ||
    (m.from === currentUser && m.to === me)
  ){

    const div =
    document.createElement("div");

    div.className = "msg";

    if(m.from === me){
      div.classList.add("mine");
    }

    div.innerText = m.text;

    messages.appendChild(div);

    messages.scrollTop =
    messages.scrollHeight;

  }

}

function sendMessage(){

  const text =
  messageInput.value.trim();

  if(!text || !currentUser){
    return;
  }

  socket.emit("message",{
    from:me,
    to:currentUser,
    text:text
  });

  messageInput.value = "";

}

socket.on("message",(data)=>{

  renderMessage(data);

});

messageInput.addEventListener(
  "keypress",
  (e)=>{

    if(e.key === "Enter"){
      sendMessage();
    }

  }
);

</script>

</body>
</html>
