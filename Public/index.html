<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARA Ping</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->

<div id="auth">

  <h1>ARA Ping</h1>
  <p>Private Messaging</p>

  <input id="username" placeholder="Username">

<input
id="password"
type="password"
placeholder="Password"

>

  <div class="authBtns">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

  <!-- SIDEBAR -->

  <div id="sidebar">


<div id="sidebarTop">

  <div class="topHeader">

    <h1>ARA Ping</h1>

    <div class="headerBtns">

      <button id="searchOpenBtn">
        🔍
      </button>

      <button id="settingsBtn">
        ⚙️
      </button>

    </div>

  </div>

</div>

<div class="sectionTitle">
  Recent Chats
</div>

<div id="users"></div>


  </div>

  <!-- CHAT AREA -->

  <div id="chatArea">


<div id="chatHeader">

  <button id="backBtn">
    ←
  </button>

  <div id="chatUserInfo">

    <img
  id="chatAvatar"
  src=""
  alt="Profile"
>

    <div>

      <div id="chatName">
        Select Chat
      </div>

      <div id="chatStatus">
        Offline
      </div>

    </div>

  </div>

</div>

<div id="messages"></div>

<div id="sendBar">

  <input
    id="messageInput"
    placeholder="Type message"
  >

  <label id="imageLabel">

    📷

    <input
      type="file"
      id="imageInput"
      accept="image/*"
    >

  </label>

  <button id="sendBtn">
    Send
  </button>

</div>


  </div>

</div>

<!-- SEARCH MODAL -->

<div id="searchModal" class="modal">

  <div class="modalBox">


<h2>Search User</h2>

<input
  id="searchModalInput"
  placeholder="Enter username"
>

<div class="modalBtns">

  <button id="searchBtn">
    Search
  </button>

  <button id="closeSearchBtn">
    Close
  </button>

</div>


  </div>

</div>

<!-- SETTINGS MODAL -->

<div id="settingsModal" class="modal">

  <div class="modalContent">


<img
  id="profilePreview"
  class="profilePic"
  src=""
>

<h3 id="profileName">
  Username
</h3>

<button id="changeProfileBtn">
  Change Profile
</button>

<input
  type="file"
  id="settingsProfilePicInput"
  accept="image/*"
  style="display:none;"
>

<button id="logoutBtn">
  Logout
</button>

<button id="closeSettingsBtn">
  Close
</button>


  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="client.js"></script>

</body>
</html>
