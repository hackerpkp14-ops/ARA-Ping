<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARA Ping</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b141a;
  color:white;
  height:100vh;
}

#auth{
  width:350px;
  margin:90px auto;
  background:#202c33;
  padding:30px;
  border-radius:16px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

#auth h1{
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:10px;
  background:#2a3942;
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  margin-top:14px;
  border:none;
  border-radius:10px;
  background:#00a884;
  color:white;
  cursor:pointer;
  font-size:15px;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

#app{
  display:none;
  height:100vh;
}

#sidebar{
  width:320px;
  background:#202c33;
  border-right:1px solid #2a3942;
  overflow-y:auto;
}

#sidebarTop{
  padding:20px;
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #2a3942;
}

.user{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
  cursor:pointer;
  transition:.2s;
  border-bottom:1px solid #2a3942;
}

.user:hover{
  background:#2a3942;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#00a884;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:15px;
  flex-shrink:0;
}

.username{
  font-size:15px;
}

#chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

#chatHeader{
  padding:18px;
  background:#202c33;
  border-bottom:1px solid #2a3942;
  font-weight:bold;
  font-size:18px;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.msg{
  max-width:70%;
  padding:12px 14px;
  margin:8px 0;
  border-radius:12px;
  background:#202c33;
  word-wrap:break-word;
}

.mine{
  background:#005c4b;
  margin-left:auto;
}

.time{
  display:block;
  margin-top:4px;
  font-size:11px;
  opacity:.7;
}

#sendBar{
  display:flex;
  padding:14px;
  background:#202c33;
  gap:10px;
}

#messageInput{
  flex:1;
  margin-top:0;
}

#sendBtn{
  width:100px;
  margin-top:0;
}

@media(max-width:700px){

  #sidebar{
    width:100px;
  }

  .username{
    display:none;
  }

  #sidebarTop{
    font-size:18px;
    text-align:center;
  }

}

</style>
</head>

<body>

<div id="auth">

  <h1>ARA Ping</h1>

  <input id="username" placeholder="Username">

  <input
    id="password"
    type="password"
    placeholder="Password"
  >

  <button id="signupBtn">
    Sign Up
  </button>

  <button id="loginBtn">
    Login
  </button>

</div>

<div id="app">

  <div id="sidebar">

    <div id="sidebarTop">
      ARA Ping
    </div>

    <div id="users"></div>

  </div>

  <div id="chat">

    <div id="chatHeader">
      Select a user
    </div>

    <div id="messages"></div>

    <div id="sendBar">

      <input
        id="messageInput"
        placeholder="Type a message"
      >

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let me = "";
let currentUser = "";

const usernameInput =
  document.getElementById("username");

const passwordInput =
  document.getElementById("password");

const auth =
  document.getElementById("auth");

const app =
  document.getElementById("app");

const usersBox =
  document.getElementById("users");

const chatHeader =
  document.getElementById("chatHeader");

const messages =
  document.getElementById("messages");

const messageInput =
  document.getElementById("messageInput");

async function post(url,data){

  const res = await fetch(url,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(data)
  });

  return await res.json();
}

document.getElementById("signupBtn").onclick =
async ()=>{

  const res = await post("/signup",{
    username:usernameInput.value.trim(),
    password:passwordInput.value.trim()
  });

  if(res.ok){
    alert("Signup successful");
  }else{
    alert(res.error || "Signup failed");
  }

};

document.getElementById("loginBtn").onclick =
async ()=>{

  const res = await post("/login",{
    username:usernameInput.value.trim(),
    password:passwordInput.value.trim()
  });

  if(!res.ok){
    return alert(res.error || "Login failed");
  }

  me = usernameInput.value.trim();

  auth.style.display = "none";
  app.style.display = "flex";

  loadUsers();

};

async function loadUsers(){

  const res = await fetch("/users/" + me);

  const users = await res.json();

  usersBox.innerHTML = "";

  users.forEach(user=>{

    const div = document.createElement("div");

    div.className = "user";

    const initials =
      user.username
      .substring(0,2)
      .toUpperCase();

    div.innerHTML = `
      <div class="avatar">
        ${initials}
      </div>

      <div class="username">
        ${user.username}
      </div>
    `;

    div.onclick = ()=>openChat(user.username);

    usersBox.appendChild(div);

  });

}

async function openChat(user){

  currentUser = user;

  chatHeader.innerText = user;

  const res =
    await fetch(`/messages/${me}/${user}`);

  const data = await res.json();

  messages.innerHTML = "";

  data.forEach(renderMessage);

}

function renderMessage(m){

  if(
    (m.from === me && m.to === currentUser)
    ||
    (m.from === currentUser && m.to === me)
  ){

    const div =
      document.createElement("div");

    div.className = "msg";

    if(m.from === me){
      div.classList.add("mine");
    }

    const time =
      new Date().toLocaleTimeString([],{
        hour:"2-digit",
        minute:"2-digit"
      });

    div.innerHTML = `
      <div>${m.text}</div>
      <span class="time">${time}</span>
    `;

    messages.appendChild(div);

    messages.scrollTop =
      messages.scrollHeight;
  }

}

document.getElementById("sendBtn").onclick =
()=>{

  const text =
    messageInput.value.trim();

  if(!text || !currentUser) return;

  socket.emit("message",{
    from:me,
    to:currentUser,
    text:text
  });

  messageInput.value = "";

};

messageInput.addEventListener(
  "keypress",
  (e)=>{

    if(e.key === "Enter"){
      document
      .getElementById("sendBtn")
      .click();
    }

  }
);

socket.on("message",(msg)=>{

  renderMessage(msg);

});

</script>

</body>
</html>
